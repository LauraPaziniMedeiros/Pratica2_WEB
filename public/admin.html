<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Poções e Soluções</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-img">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAacviNtSY0o9dglrLLlTWkSiAjxwaXLt6I2zOjkY7Ww&s=10" alt="Logo" class="logo-img">
            </div>
            <div class="brand">
                <h1>Poções e Soluções</h1>
                <p>Beco da Última Saída</p>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" id="nav-home">Loja</a></li>
                    <li><a href="admin.html" id="nav-admin" class="active">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <h2>Cadastrar Nova Poção</h2>
            <form id="add-potion-form">
                <input type="text" id="nome" placeholder="Nome da Poção" required>
                <textarea id="descricao" placeholder="Descrição" required></textarea>
                <input type="img" id="imagem" placeholder="URL da Imagem" required>
                <input type="number" id="preco" placeholder="Preço (Moedas)" required>
                <button type="submit" class="btn-submit">Cadastrar Poção</button>
            </form>
        </section>

        <section>
            <h2>Poções Cadastradas</h2>
            <div id="admin-potions-container" class="products-grid">
                </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrjI4m0HtXgaVt38WN_iONvSTqH5-Mol0HfTJgs2_aLw&s=10" alt="mail" class="footer-img">
            </div>
            <div class="footer-content">
                <p>Contato: merigold@becodaultimasaida.magia</p>
            </div>
            <div>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjStlb5r6_r7eVvcAztE8bsLl243frGarnUyk0i0JPVw&s=10" alt="mail" class="footer-img">
            </div>
            <div class="footer-content">
                <p>Beco da Última Saída, nº 42</p>
            </div>
        </div>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
